services:
  - type: web
    name: skillbridge-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: skillbridge-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://skillbridge-frontend.vercel.app

databases:
  - name: skillbridge-db
    databaseName: skillbridge
    user: skillbridge_user
